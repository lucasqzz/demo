server:
  port: 8083

spring:
  application:
    name: order-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yml
        import-check:
          enabled: false
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
    openfeign:
      sentinel:
        enabled: true
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
    stream:
      rocketmq:
        binder:
          name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
      bindings:
        orderCreated-out-0:
          destination: order-created-topic
    loadbalancer:
      nacos:
        enabled: true
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/ecommerce_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
