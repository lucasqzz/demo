server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/ecommerce_product?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
    stream:
      rocketmq:
        binder:
          name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
      bindings:
        stockReduce-in-0:
          destination: order-created-topic
          group: product-stock-group
      function:
        definition: stockReduce

mybatis:
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
